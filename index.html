<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker </title>

    <!-- font integration -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


<!-- font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

     <!-- tailwind + diasyui -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- stylesheet  -->
 <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="min-h-screen flex items-center justify-center bg-gray-50">
    
    <div class="card w-full max-w-md bg-base-100 shadow-xl p-8 text-center border border-gray-100">
        
        <img src="./assets/github-logo.png" alt="Logo" class="w-16 mx-auto mb-4"> 
        
        <h2 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h2>
        <p class="text-sm text-gray-500 mb-6">Sign in to manage your issues</p>

        <form id="login-form" class="space-y-4 text-left">
            
            <div class="form-control">
                <label class="label">
                    <span class="label-text font-semibold text-gray-700">Username</span>
                </label>
                <input type="text" id="username" placeholder="Enter Username" class="input input-bordered w-full focus:outline-none focus:border-indigo-500" required />
                <label class="label">
                    <span class="label-text-alt text-indigo-600 font-medium">Default: admin</span>
                </label>
            </div>

            <div class="form-control">
                <label class="label">
                    <span class="label-text font-semibold text-gray-700">Password</span>
                </label>
                <input type="password" id="password" placeholder="Enter Password" class="input input-bordered w-full focus:outline-none focus:border-blue-500" required />
                <label class="label">
                    <span class="label-text-alt text-indigo-600 font-medium">Default: admin123</span>
                </label>
            </div>

            <button type="submit" class="btn bg-indigo-600 hover:bg-indigo-700 text-white w-full mt-4 border-none">Sign In</button>
        </form>

        <div class="mt-6 text-sm text-gray-500 space-y-1">
            <p>OR</p>
            <p class="mt-2">Demo credentials</p>
            <p class="font-medium text-gray-700">Username: admin</p>
            <p class="font-medium text-gray-700">Password: admin123</p>
        </div>
        
    </div>
</div>
    <script src="index.js"></script>
</body>
</html>
